name: Build Mobile Apps

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Sync web assets to Android
        run: npm run cap:sync

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: peervault-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync web assets to iOS
        run: npm run cap:sync

      - name: Resolve Swift packages
        working-directory: ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build iOS app (unsigned, simulator)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || true

      - name: Package .app into zip
        working-directory: ios/App
        run: |
          APP_PATH=$(find build -name "App.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/PeerVault-ios-simulator.zip" "$(basename "$APP_PATH")"
          else
            echo "::error::App.app not found in build output"
            exit 1
          fi

      - name: Upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: peervault-ios-simulator
          path: PeerVault-ios-simulator.zip
          retention-days: 30
