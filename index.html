<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PeerVault</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { height: 100%; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #2e2e2e;
      --text: #e4e4e4;
      --text-dim: #777;
      --accent: #6c63ff;
      --accent-hover: #7f78ff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --radius: 10px;
      --sidebar-w: 280px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── App layout ── */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .sidebar-header button {
      font-size: 12px;
      padding: 5px 10px;
    }

    .sidebar-id {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .sidebar-id .id-value {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: var(--accent);
      user-select: all;
      font-size: 11px;
    }

    .sidebar-id-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .sidebar-id-row button {
      font-size: 10px;
      padding: 2px 6px;
    }

    .username-row {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .username-row input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .username-row input:focus { border-color: var(--accent); }
    .username-row input::placeholder { color: var(--text-dim); }

    .room-list {
      flex: 1;
      overflow-y: auto;
    }

    .room-list::-webkit-scrollbar { width: 4px; }
    .room-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .room-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      transition: background 0.15s;
    }

    .room-item:hover { background: var(--surface-2); }
    .room-item.active { background: var(--surface-2); border-left: 3px solid var(--accent); padding-left: 13px; }

    .room-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
    }

    .room-dot.connected { background: var(--green); }
    .room-dot.connecting { background: var(--yellow); }

    .room-info {
      flex: 1;
      min-width: 0;
    }

    .room-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .room-preview {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .unread-badge {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .room-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      padding: 0 4px;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .room-item:hover .room-close { opacity: 1; }
    .room-close:hover { color: var(--red); }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 49;
    }

    .sidebar-backdrop.active { display: block; }

    /* ── Main content ── */
    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .sidebar-toggle {
      background: none;
      border: none;
      color: var(--text);
      font-size: 18px;
      padding: 4px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }

    .sidebar-toggle:hover { color: var(--accent); }

    .sidebar-toggle .notif-dot {
      display: none;
      position: absolute;
      top: 2px;
      right: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
    }

    .sidebar-toggle .notif-dot.active { display: block; }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex: 1;
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .status-dot.connecting { background: var(--yellow); }
    .status-dot.connected  { background: var(--green); }
    .status-dot.error      { background: var(--red); }

    /* ── Connect bar ── */
    .connect-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .connect-group {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 200px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--text-dim); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.secondary {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    button.secondary:hover { background: var(--border); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.own { align-self: flex-end; align-items: flex-end; }
    .msg.their { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 2px;
      padding: 0 4px;
    }

    .msg.own .msg-sender { color: var(--accent); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg.own .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.their .msg-bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
      padding: 0 4px;
    }

    .msg-system {
      align-self: center;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 20px;
      margin: 8px 0;
    }

    .typing-indicator {
      align-self: flex-start;
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 8px;
      min-height: 24px;
      font-style: italic;
    }

    .encryption-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.25);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    .encryption-badge.active { display: flex; }

    .encryption-badge svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* ── QR Modal ── */
    .qr-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .qr-overlay.active { display: flex; }

    .qr-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 340px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn 0.2s ease;
    }

    .qr-modal h2 { font-size: 15px; font-weight: 700; color: var(--text); }
    .qr-modal canvas { border-radius: 12px; }
    .qr-modal p { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.5; }

    /* ── Chat input ── */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input input[type="text"] { font-size: 14px; padding: 10px 14px; }
    .chat-input button { padding: 10px 24px; font-size: 14px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 20px;
    }

    .empty-state p { font-size: 14px; max-width: 360px; line-height: 1.5; }

    .empty-state .step {
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
    }

    .empty-state .step strong { color: var(--text); }

    /* Hide share button on desktop — only useful on mobile */
    #shareBtn { display: none; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      #shareBtn { display: inline-flex; }
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 85vw;
        max-width: 320px;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      .sidebar.open { transform: translateX(0); }

      .header {
        padding: 10px 12px;
        padding-top: calc(10px + env(safe-area-inset-top, 0px));
        gap: 8px;
      }

      .header-title { font-size: 14px; }

      .encryption-badge span { display: none; }
      .encryption-badge { padding: 3px 6px; gap: 0; }

      .connect-bar {
        flex-direction: column;
        padding: 10px 12px;
        gap: 6px;
      }

      .connect-bar.hidden-connected { display: none; }

      .connect-group { min-width: 0; width: 100%; }

      .messages { padding: 12px; }
      .msg { max-width: 88%; }
      .msg-bubble { font-size: 15px; padding: 10px 12px; }

      .chat-input {
        padding: 10px 12px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        gap: 6px;
      }

      .typing-indicator { padding: 2px 12px; min-height: 20px; }

      input[type="text"] { font-size: 16px; }
      .chat-input input[type="text"] { font-size: 16px; }

      button { min-height: 44px; padding: 10px 16px; }
      .chat-input button { padding: 10px 20px; font-size: 15px; }
      button.secondary { min-height: 36px; }

      .sidebar-header button { min-height: 36px; }
      .sidebar-id-row button { min-height: 36px; min-width: 36px; padding: 4px 10px; font-size: 11px; }
    }

    @media (min-width: 521px) {
      .sidebar-toggle { display: none; }
      .sidebar-backdrop { display: none !important; }
    }
  </style>

<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="newChatBtn" title="Start a new chat">+ New</button>
      </div>
      <div class="sidebar-id">
        <div>Your ID</div>
        <div class="sidebar-id-row">
          <span class="id-value" id="myId">...</span>
          <button class="secondary" id="copyBtn" title="Copy your Peer ID" disabled>Copy</button>
          <button class="secondary" id="shareBtn" title="Share your Peer ID" disabled>Share</button>
          <button class="secondary" id="qrBtn" title="Show QR code" disabled>QR</button>
        </div>
      </div>
      <div class="username-row">
        <input type="text" id="usernameInput" placeholder="Your display name (optional)" aria-label="Display name" autocomplete="off" spellcheck="false" maxlength="30">
      </div>
      <div class="room-list" id="roomList"></div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Main content -->
    <main>
      <header class="header">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰<span class="notif-dot" id="notifDot"></span></button>
        <h1 class="header-title" id="headerTitle">PeerVault</h1>
        <div class="encryption-badge" id="encBadge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>E2E Encrypted</span>
        </div>
        <div class="status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Initializing...</span>
        </div>
      </header>

      <!-- Connect bar (shown for new chat) -->
      <div class="connect-bar" id="connectBar">
        <div class="connect-group">
          <input type="text" id="remoteIdInput" placeholder="Enter peer's ID to connect" aria-label="Remote peer ID" autocomplete="off" spellcheck="false">
          <button id="connectBtn" disabled>Connect</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <p>No chats yet.</p>
          <div class="step">
            <strong>1.</strong> Copy your ID and share it with a friend<br>
            <strong>2.</strong> Or click <strong>+ New</strong> and paste their ID<br>
            <strong>3.</strong> Start chatting with E2E encryption
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator"></div>

      <!-- Chat input -->
      <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Type a message..." aria-label="Message text" autocomplete="off" disabled>
        <button id="sendBtn" disabled>Send</button>
      </div>
    </main>
  </div>

  <!-- QR overlay -->
  <div class="qr-overlay" id="qrOverlay">
    <div class="qr-modal">
      <h2>Scan to Connect</h2>
      <canvas id="qrCanvas"></canvas>
      <p>Scan this QR code with a phone camera to open a chat connected to your peer ID.</p>
      <button class="secondary" id="qrCloseBtn">Close</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>

  <script>
    (function () {
      'use strict';

      // ── DOM refs ──
      const $ = (id) => document.getElementById(id);
      const myIdEl        = $('myId');
      const copyBtn       = $('copyBtn');
      const shareBtn      = $('shareBtn');
      const remoteIdInput = $('remoteIdInput');
      const connectBtn    = $('connectBtn');
      const messagesEl    = $('messages');
      const emptyState    = $('emptyState');
      const typingEl      = $('typingIndicator');
      const msgInput      = $('msgInput');
      const sendBtn       = $('sendBtn');
      const statusDot     = $('statusDot');
      const statusText    = $('statusText');
      const encBadge      = $('encBadge');
      const connectBar    = $('connectBar');
      const qrBtn         = $('qrBtn');
      const qrOverlay     = $('qrOverlay');
      const qrCanvas      = $('qrCanvas');
      const qrCloseBtn    = $('qrCloseBtn');
      const sidebar       = $('sidebar');
      const sidebarToggle = $('sidebarToggle');
      const sidebarBackdrop = $('sidebarBackdrop');
      const roomListEl    = $('roomList');
      const headerTitle   = $('headerTitle');
      const notifDot      = $('notifDot');
      const usernameInput = $('usernameInput');
      const newChatBtn    = $('newChatBtn');

      // ── State ──
      let peer = null;
      let rooms = [];
      let activeRoomId = null;
      let typingTimeout = null;
      let myUsername = localStorage.getItem('peervault_username') || '';
      let heartbeatInterval = null;
      let appInForeground = true;

      usernameInput.value = myUsername;

      // ── Capacitor native APIs (no-op in browser) ──
      const isNative = typeof window.Capacitor !== 'undefined' &&
                       window.Capacitor.isNativePlatform &&
                       window.Capacitor.isNativePlatform();
      const capPlugins = isNative ? window.Capacitor.Plugins : {};

      async function nativeShare(text, title) {
        if (isNative && capPlugins.Share) {
          try { await capPlugins.Share.share({ title, text, dialogTitle: title }); return true; }
          catch { return false; }
        }
        if (navigator.share) {
          try { await navigator.share({ title, text }); return true; }
          catch { return false; }
        }
        return false;
      }

      async function nativeCopy(text) {
        if (isNative && capPlugins.Clipboard) {
          try { await capPlugins.Clipboard.write({ string: text }); return true; }
          catch { /* fall through */ }
        }
        try { await navigator.clipboard.writeText(text); return true; }
        catch { return false; }
      }

      function nativeHaptic() {
        if (isNative && capPlugins.Haptics) {
          try { capPlugins.Haptics.impact({ style: 'LIGHT' }); } catch {}
        }
      }

      // Configure native status bar when running in Capacitor
      if (isNative && capPlugins.StatusBar) {
        try {
          capPlugins.StatusBar.setStyle({ style: 'DARK' });
          capPlugins.StatusBar.setBackgroundColor({ color: '#1a1a1a' });
        } catch {}
      }

      // Handle Android back button
      if (isNative && capPlugins.App) {
        capPlugins.App.addListener('backButton', () => {
          if (sidebar.classList.contains('open')) {
            sidebar.classList.remove('open');
            sidebarBackdrop.classList.remove('active');
          } else if (activeRoomId && window.innerWidth <= 520) {
            showNewChatView();
            sidebar.classList.add('open');
            sidebarBackdrop.classList.add('active');
          } else {
            capPlugins.App.exitApp();
          }
        });
      }

      // ── Background mode (keeps connection alive when screen is locked) ──
      if (isNative && capPlugins.BackgroundMode) {
        try {
          capPlugins.BackgroundMode.enable();
          capPlugins.BackgroundMode.setSettings({
            title: 'PeerVault',
            text: 'Keeping your connections alive',
            icon: 'ic_launcher',
            silent: true,
          });
        } catch {}
      }

      // ── Local notifications (alert on incoming messages while backgrounded) ──
      let notificationsEnabled = false;
      if (isNative && capPlugins.LocalNotifications) {
        capPlugins.LocalNotifications.requestPermissions().then(result => {
          notificationsEnabled = result.display === 'granted';
        }).catch(() => {});
        // Bring app to foreground when notification tapped
        capPlugins.LocalNotifications.addListener('localNotificationActionPerformed', () => {
          // App resumes automatically on tap
        });
      }

      function notifyMessage(senderName, text) {
        if (!notificationsEnabled || appInForeground) return;
        if (!capPlugins.LocalNotifications) return;
        capPlugins.LocalNotifications.schedule({
          notifications: [{
            id: Date.now() % 2147483647,
            title: senderName || 'PeerVault',
            body: text.length > 100 ? text.slice(0, 100) + '…' : text,
            smallIcon: 'ic_launcher',
          }]
        }).catch(() => {});
      }

      // Track foreground/background state
      if (isNative && capPlugins.App) {
        capPlugins.App.addListener('appStateChange', (state) => {
          appInForeground = state.isActive;
        });
      }
      document.addEventListener('visibilitychange', () => {
        appInForeground = document.visibilityState === 'visible';
      });

      // ── E2E Crypto (ECDH + AES-256-GCM) ──
      const ECDH_PARAMS = { name: 'ECDH', namedCurve: 'P-256' };
      const AES_PARAMS  = { name: 'AES-GCM', length: 256 };

      async function generateKeyPair() {
        return crypto.subtle.generateKey(ECDH_PARAMS, false, ['deriveKey']);
      }

      async function exportPublicKey(key) {
        const raw = await crypto.subtle.exportKey('raw', key);
        return Array.from(new Uint8Array(raw));
      }

      async function importPublicKey(rawArray) {
        return crypto.subtle.importKey('raw', new Uint8Array(rawArray), ECDH_PARAMS, true, []);
      }

      async function deriveSharedKey(privateKey, remotePublicKey) {
        return crypto.subtle.deriveKey(
          { name: 'ECDH', public: remotePublicKey },
          privateKey,
          AES_PARAMS,
          false,
          ['encrypt', 'decrypt']
        );
      }

      async function encryptMessage(text, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoded = new TextEncoder().encode(text);
        const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
        return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ciphertext)) };
      }

      async function decryptMessage(payload, key) {
        const iv = new Uint8Array(payload.iv);
        const ct = new Uint8Array(payload.ct);
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        return new TextDecoder().decode(decrypted);
      }

      // ── Helpers ──
      function formatTime(ts) {
        return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function isMobile() { return window.innerWidth <= 520; }

      function getActiveRoom() { return rooms.find(r => r.id === activeRoomId) || null; }

      function roomDisplayName(room) {
        return room.remoteName || room.remotePeerId.slice(0, 12) + '…';
      }

      function ownDisplayName() { return myUsername || 'You'; }
      function theirDisplayName(room) { return room.remoteName || 'Them'; }

      // ── Room factory ──
      function createRoom(remotePeerId) {
        const existing = rooms.find(r => r.remotePeerId === remotePeerId);
        if (existing) return existing;

        const room = {
          id: 'room_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          conn: null,
          sharedKey: null,
          myKeyPair: null,
          keyPairReady: null,
          remotePeerId,
          remoteName: '',
          history: [],
          unreadCount: 0,
          isEncrypted: false,
          remoteTypingTimeout: null,
          isRemoteTyping: false,
          reconnectAttempts: 0,
          reconnectTimer: null,
          shouldReconnect: false,
        };
        room.keyPairReady = generateKeyPair().then(kp => { room.myKeyPair = kp; return kp; });
        rooms.push(room);
        return room;
      }

      // ── Auto-reconnect ──
      const RECONNECT_BASE_DELAY = 2000;
      const RECONNECT_MAX_DELAY = 30000;
      const RECONNECT_MAX_ATTEMPTS = 50;
      const HEARTBEAT_INTERVAL = 15000;
      const HEARTBEAT_TIMEOUT = 10000;

      function reconnectRoom(room) {
        if (!room.shouldReconnect) return;
        if (room.conn && room.conn.open) return;
        if (!peer || peer.destroyed || peer.disconnected) return;
        if (room.reconnectAttempts >= RECONNECT_MAX_ATTEMPTS) {
          addSystemMessage(room, 'Gave up reconnecting after ' + RECONNECT_MAX_ATTEMPTS + ' attempts');
          room.shouldReconnect = false;
          return;
        }

        room.reconnectAttempts++;
        const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(1.5, room.reconnectAttempts - 1), RECONNECT_MAX_DELAY);
        const jitter = delay * (0.5 + Math.random() * 0.5);

        if (room.id === activeRoomId) setStatus('connecting', 'Reconnecting (attempt ' + room.reconnectAttempts + ')...');

        room.reconnectTimer = setTimeout(() => {
          if (!room.shouldReconnect || !peer || peer.destroyed || peer.disconnected) return;
          if (room.conn && room.conn.open) return;

          room.keyPairReady = generateKeyPair().then(kp => { room.myKeyPair = kp; return kp; });
          room.conn = peer.connect(room.remotePeerId, { reliable: true });
          setupConnection(room);
        }, jitter);
      }

      function cancelReconnect(room) {
        room.shouldReconnect = false;
        room.reconnectAttempts = 0;
        clearTimeout(room.reconnectTimer);
        room.reconnectTimer = null;
      }

      function reconnectAllRooms() {
        for (const room of rooms) {
          if (room.shouldReconnect && (!room.conn || !room.conn.open)) {
            room.reconnectAttempts = 0;
            clearTimeout(room.reconnectTimer);
            reconnectRoom(room);
          }
        }
      }

      // Heartbeat: detect dead connections that didn't fire 'close'
      function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
          for (const room of rooms) {
            if (!room.conn || !room.conn.open) continue;
            try {
              room.conn.send({ type: 'ping' });
              // Set a timeout — if no pong comes back, the connection is dead
              if (room._pingTimeout) clearTimeout(room._pingTimeout);
              room._pingTimeout = setTimeout(() => {
                if (room.conn && room.conn.open) {
                  // Connection appears open but is actually dead
                  try { room.conn.close(); } catch {}
                }
              }, HEARTBEAT_TIMEOUT);
            } catch {
              // Send failed — connection is dead
              try { room.conn.close(); } catch {}
            }
          }
        }, HEARTBEAT_INTERVAL);
      }

      // ── Sidebar rendering ──
      function renderSidebar() {
        roomListEl.innerHTML = '';
        let totalUnread = 0;
        for (const room of rooms) {
          totalUnread += room.unreadCount;
          const el = document.createElement('div');
          el.className = 'room-item' + (room.id === activeRoomId ? ' active' : '');
          el.dataset.roomId = room.id;

          const dot = document.createElement('span');
          dot.className = 'room-dot';
          if (room.isEncrypted && room.conn && room.conn.open) dot.classList.add('connected');
          else if (room.conn && room.conn.open) dot.classList.add('connecting');

          const info = document.createElement('div');
          info.className = 'room-info';
          const name = document.createElement('div');
          name.className = 'room-name';
          name.textContent = roomDisplayName(room);
          const preview = document.createElement('div');
          preview.className = 'room-preview';
          const last = room.history.filter(h => h.kind === 'message').pop();
          preview.textContent = last ? (last.isOwn ? 'You: ' : '') + last.text.slice(0, 30) : 'No messages yet';
          info.appendChild(name);
          info.appendChild(preview);

          el.appendChild(dot);
          el.appendChild(info);

          if (room.unreadCount > 0) {
            const badge = document.createElement('span');
            badge.className = 'unread-badge';
            badge.textContent = room.unreadCount;
            el.appendChild(badge);
          }

          const closeBtn = document.createElement('button');
          closeBtn.className = 'room-close';
          closeBtn.textContent = '×';
          closeBtn.title = 'Close chat';
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            removeRoom(room.id);
          });
          el.appendChild(closeBtn);

          el.addEventListener('click', () => switchRoom(room.id));
          roomListEl.appendChild(el);
        }

        notifDot.classList.toggle('active', totalUnread > 0);
      }

      function removeRoom(roomId) {
        const room = rooms.find(r => r.id === roomId);
        if (room) {
          cancelReconnect(room);
          if (room.conn && room.conn.open) room.conn.close();
          clearTimeout(room.remoteTypingTimeout);
          clearTimeout(room._pingTimeout);
        }
        rooms = rooms.filter(r => r.id !== roomId);
        if (activeRoomId === roomId) {
          activeRoomId = rooms.length > 0 ? rooms[0].id : null;
          if (activeRoomId) switchRoom(activeRoomId);
          else showNewChatView();
        }
        renderSidebar();
      }

      // ── View management ──
      function switchRoom(roomId) {
        activeRoomId = roomId;
        const room = getActiveRoom();
        if (!room) return showNewChatView();

        room.unreadCount = 0;
        connectBar.style.display = 'none';
        if (isMobile()) connectBar.classList.add('hidden-connected');

        // Render history
        messagesEl.innerHTML = '';
        emptyState.style.display = 'none';
        for (const entry of room.history) {
          if (entry.kind === 'system') appendSystemEl(entry.text);
          else appendMessageEl(entry.text, entry.sender, entry.isOwn);
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;

        // Update header
        headerTitle.textContent = roomDisplayName(room);
        encBadge.classList.toggle('active', room.isEncrypted);
        if (room.isEncrypted && room.conn && room.conn.open) {
          setStatus('connected', 'Connected to ' + room.remotePeerId);
        } else if (room.conn && room.conn.open) {
          setStatus('connecting', 'Exchanging encryption keys...');
        } else if (room.conn) {
          setStatus('connecting', 'Connecting...');
        } else {
          setStatus('', 'Disconnected');
        }

        // Typing
        typingEl.textContent = room.isRemoteTyping ? (theirDisplayName(room) + ' is typing...') : '';

        // Chat input
        const canChat = room.isEncrypted && room.conn && room.conn.open;
        msgInput.disabled = !canChat;
        sendBtn.disabled = !canChat;
        if (canChat) msgInput.focus();

        // Close sidebar on mobile
        closeSidebar();
        renderSidebar();
      }

      function showNewChatView() {
        activeRoomId = null;
        connectBar.style.display = '';
        connectBar.classList.remove('hidden-connected');
        messagesEl.innerHTML = '';
        emptyState.style.display = '';
        messagesEl.appendChild(emptyState);
        headerTitle.textContent = 'PeerVault';
        encBadge.classList.remove('active');
        setStatus('', 'Waiting for connection');
        typingEl.textContent = '';
        msgInput.disabled = true;
        sendBtn.disabled = true;
        remoteIdInput.value = '';
        connectBtn.disabled = false;
        renderSidebar();
      }

      // ── DOM helpers (append to visible DOM, not history) ──
      function appendMessageEl(text, sender, isOwn) {
        emptyState.style.display = 'none';
        const wrapper = document.createElement('div');
        wrapper.className = 'msg ' + (isOwn ? 'own' : 'their');
        const senderEl = document.createElement('div');
        senderEl.className = 'msg-sender';
        senderEl.textContent = sender;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = formatTime(Date.now());
        wrapper.appendChild(senderEl);
        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendSystemEl(text) {
        emptyState.style.display = 'none';
        const el = document.createElement('div');
        el.className = 'msg-system';
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // ── Room-aware message/system helpers ──
      function addMessage(room, text, sender, isOwn) {
        room.history.push({ kind: 'message', text, sender, isOwn, timestamp: Date.now() });
        if (room.id === activeRoomId) appendMessageEl(text, sender, isOwn);
        else room.unreadCount++;
        renderSidebar();
      }

      function addSystemMessage(room, text) {
        room.history.push({ kind: 'system', text, timestamp: Date.now() });
        if (room.id === activeRoomId) appendSystemEl(text);
        renderSidebar();
      }

      function setStatus(state, text) {
        statusDot.className = 'status-dot ' + state;
        statusText.textContent = text;
      }

      // ── Typing ──
      function showRemoteTyping(room) {
        room.isRemoteTyping = true;
        clearTimeout(room.remoteTypingTimeout);
        if (room.id === activeRoomId) {
          typingEl.textContent = theirDisplayName(room) + ' is typing...';
        }
        room.remoteTypingTimeout = setTimeout(() => {
          room.isRemoteTyping = false;
          if (room.id === activeRoomId) typingEl.textContent = '';
        }, 2500);
      }

      function sendTypingSignal() {
        const room = getActiveRoom();
        if (room && room.conn && room.conn.open) {
          room.conn.send({ type: 'typing' });
        }
      }

      // ── Connection handling ──
      function setupConnection(room) {
        const conn = room.conn;
        room.sharedKey = null;
        room.isEncrypted = false;

        if (room.id === activeRoomId) {
          encBadge.classList.remove('active');
          setStatus('connecting', 'Connecting...');
        }

        let openHandled = false;
        const onOpen = async () => {
          if (openHandled) return;
          openHandled = true;
          if (room.id === activeRoomId) setStatus('connecting', 'Exchanging encryption keys...');
          addSystemMessage(room, 'Connected to peer ' + conn.peer);

          if (room.keyPairReady) await room.keyPairReady;
          const pubKey = await exportPublicKey(room.myKeyPair.publicKey);
          conn.send({ type: 'key-exchange', publicKey: pubKey });
        };

        conn.on('open', onOpen);
        if (conn.open) onOpen();

        conn.on('data', async (data) => {
          if (!data || !data.type) return;

          if (data.type === 'ping') {
            try { conn.send({ type: 'pong' }); } catch {}
            return;
          }
          if (data.type === 'pong') {
            clearTimeout(room._pingTimeout);
            return;
          }

          if (data.type === 'key-exchange') {
            try {
              if (room.keyPairReady) await room.keyPairReady;
              const remotePubKey = await importPublicKey(data.publicKey);
              room.sharedKey = await deriveSharedKey(room.myKeyPair.privateKey, remotePubKey);
              room.isEncrypted = true;
              room.shouldReconnect = true;
              room.reconnectAttempts = 0;

              // Send username encrypted now that we have a shared key
              if (myUsername) {
                const payload = await encryptMessage(JSON.stringify({ type: 'username', username: myUsername }), room.sharedKey);
                conn.send({ type: 'encrypted', payload });
              }

              if (room.id === activeRoomId) {
                encBadge.classList.add('active');
                setStatus('connected', 'Connected to ' + conn.peer);
                headerTitle.textContent = roomDisplayName(room);
                msgInput.disabled = false;
                sendBtn.disabled = false;
                msgInput.focus();
                if (isMobile()) connectBar.classList.add('hidden-connected');
              }
              addSystemMessage(room, 'E2E encryption established');
              renderSidebar();
            } catch (e) {
              if (room.id === activeRoomId) setStatus('error', 'Key exchange failed');
              addSystemMessage(room, 'Encryption handshake failed: ' + e.message);
            }
            return;
          }

          if (data.type === 'username-update') {
            // Legacy fallback — new clients send usernames encrypted
            if (data.username !== undefined) {
              room.remoteName = data.username;
              if (room.id === activeRoomId) headerTitle.textContent = roomDisplayName(room);
              renderSidebar();
            }
            return;
          }

          if (data.type === 'typing') {
            showRemoteTyping(room);
            return;
          }

          if (data.type === 'encrypted' && room.sharedKey) {
            try {
              const text = await decryptMessage(data.payload, room.sharedKey);

              // Check if this is a control message (JSON with a type field)
              try {
                const parsed = JSON.parse(text);
                if (parsed.type === 'username') {
                  room.remoteName = parsed.username || '';
                  if (room.id === activeRoomId) headerTitle.textContent = roomDisplayName(room);
                  renderSidebar();
                  return;
                }
              } catch (_) { /* not JSON — it's a regular chat message */ }

              addMessage(room, text, theirDisplayName(room), false);
              notifyMessage(theirDisplayName(room), text);
              room.isRemoteTyping = false;
              clearTimeout(room.remoteTypingTimeout);
              if (room.id === activeRoomId) typingEl.textContent = '';
            } catch (e) {
              addSystemMessage(room, 'Failed to decrypt message');
            }
            return;
          }
        });

        conn.on('close', () => {
          room.sharedKey = null;
          room.isEncrypted = false;
          room.conn = null;
          room.isRemoteTyping = false;
          clearTimeout(room.remoteTypingTimeout);
          clearTimeout(room._pingTimeout);

          if (room.id === activeRoomId) {
            encBadge.classList.remove('active');
            msgInput.disabled = true;
            sendBtn.disabled = true;
            typingEl.textContent = '';
            connectBar.classList.remove('hidden-connected');
          }

          if (room.shouldReconnect) {
            addSystemMessage(room, 'Connection lost — reconnecting...');
            if (room.id === activeRoomId) setStatus('connecting', 'Reconnecting...');
            reconnectRoom(room);
          } else {
            addSystemMessage(room, 'Peer disconnected');
            if (room.id === activeRoomId) setStatus('', 'Disconnected');
          }
          renderSidebar();
        });

        conn.on('error', (err) => {
          if (room.id === activeRoomId) setStatus('error', 'Connection error');
          addSystemMessage(room, 'Connection error: ' + err.message);
          // If this was a reconnect attempt and it failed, try again
          if (room.shouldReconnect && (!room.conn || !room.conn.open)) {
            reconnectRoom(room);
          }
        });
      }

      // ── Persistent Peer ID ──
      const PEER_ID_KEY = 'peervault_peer_id';

      function getSavedPeerId() {
        return localStorage.getItem(PEER_ID_KEY);
      }

      function savePeerId(id) {
        localStorage.setItem(PEER_ID_KEY, id);
      }

      // ── Init PeerJS ──
      function initPeer() {
        setStatus('connecting', 'Connecting to signaling server...');

        const params = new URLSearchParams(window.location.search);
        const peerHost = params.get('peerHost');
        const peerPort = params.get('peerPort');

        const opts = {
          config: {
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun3.l.google.com:19302' },
              { urls: 'stun:stun4.l.google.com:19302' }
            ]
          }
        };

        if (peerHost && peerPort) {
          opts.host = peerHost;
          opts.port = parseInt(peerPort, 10);
          opts.path = '/';
          opts.secure = false;
        }

        const savedId = getSavedPeerId();
        peer = new Peer(savedId || undefined, opts);

        peer.on('open', (id) => {
          savePeerId(id);
          myIdEl.textContent = id;
          copyBtn.disabled = false;
          shareBtn.disabled = false;
          connectBtn.disabled = false;
          qrBtn.disabled = false;
          if (!activeRoomId) setStatus('', 'Waiting for connection');

          // Reconnect any rooms that were waiting for the signaling server
          reconnectAllRooms();

          // Auto-connect if opened via QR code / link with #peer= hash
          const hashParams = new URLSearchParams(window.location.hash.slice(1));
          const targetPeer = hashParams.get('peer');
          if (targetPeer && targetPeer !== id) {
            remoteIdInput.value = targetPeer;
            history.replaceState(null, '', window.location.pathname + window.location.search);
            connectBtn.click();
          }
        });

        peer.on('connection', (incoming) => {
          // Check for existing room with this peer
          let room = rooms.find(r => r.remotePeerId === incoming.peer);
          if (room && room.conn && room.conn.open) {
            // Already have an active connection to this peer — reject duplicate
            incoming.on('open', () => {
              incoming.send({ type: 'chat', text: '[Peer is already in a session]' });
              setTimeout(() => incoming.close(), 500);
            });
            return;
          }

          if (room) {
            // Reconnect scenario — reuse existing room with new key pair
            clearTimeout(room.reconnectTimer);
            room.reconnectAttempts = 0;
            room.keyPairReady = generateKeyPair().then(kp => { room.myKeyPair = kp; return kp; });
            room.conn = incoming;
          } else {
            room = createRoom(incoming.peer);
            room.conn = incoming;
          }

          // Set up connection handlers SYNCHRONOUSLY to avoid missing events
          setupConnection(room);
          addSystemMessage(room, 'Incoming connection from ' + incoming.peer);
          renderSidebar();

          // Auto-switch to the new room
          switchRoom(room.id);
        });

        peer.on('error', (err) => {
          if (err.type === 'unavailable-id') {
            // Saved ID is taken (stale session) — clear it and retry with a new ID
            localStorage.removeItem(PEER_ID_KEY);
            if (peer && !peer.destroyed) { try { peer.destroy(); } catch {} }
            setTimeout(() => initPeer(), 1000);
          } else if (err.type === 'peer-unavailable') {
            setStatus('error', 'Peer not found');
            const room = getActiveRoom();
            if (room) addSystemMessage(room, 'Peer not found — check the ID and try again');
            else appendSystemEl('Peer not found — check the ID and try again');
            connectBtn.disabled = false;
          } else if (err.type === 'disconnected' || err.type === 'network') {
            setStatus('error', 'Network error — reconnecting...');
            setTimeout(() => {
              if (peer && peer.destroyed) return;
              peer.reconnect();
            }, 3000);
          } else {
            setStatus('error', 'Error: ' + err.type);
            const room = getActiveRoom();
            if (room) addSystemMessage(room, 'Error: ' + err.message);
          }
        });

        peer.on('disconnected', () => {
          if (!peer.destroyed) {
            setStatus('connecting', 'Reconnecting...');
            setTimeout(() => {
              if (peer && !peer.destroyed) peer.reconnect();
            }, 2000);
          }
        });
      }

      // ── Sidebar toggle ──
      function openSidebar() {
        sidebar.classList.add('open');
        sidebarBackdrop.classList.add('active');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        sidebarBackdrop.classList.remove('active');
      }

      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
      });

      sidebarBackdrop.addEventListener('click', closeSidebar);

      // ── Event listeners ──
      newChatBtn.addEventListener('click', () => {
        showNewChatView();
        closeSidebar();
        remoteIdInput.focus();
      });

      copyBtn.addEventListener('click', async () => {
        const id = myIdEl.textContent;
        if (!id || id === '...') return;
        const ok = await nativeCopy(id);
        if (ok) {
          nativeHaptic();
          const original = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          setTimeout(() => { copyBtn.textContent = original; }, 1500);
        }
      });

      shareBtn.addEventListener('click', async () => {
        const id = myIdEl.textContent;
        if (!id || id === '...') return;
        const shareUrl = window.location.origin + window.location.pathname + '#peer=' + id;
        const shared = await nativeShare('Connect with me on PeerVault: ' + shareUrl, 'PeerVault');
        if (!shared) {
          // Fallback: copy to clipboard
          const ok = await nativeCopy(shareUrl);
          if (ok) {
            nativeHaptic();
            const original = shareBtn.textContent;
            shareBtn.textContent = 'Copied!';
            setTimeout(() => { shareBtn.textContent = original; }, 1500);
          }
        }
      });

      connectBtn.addEventListener('click', () => {
        const remoteId = remoteIdInput.value.trim();
        if (!remoteId) return;
        if (remoteId === myIdEl.textContent) {
          appendSystemEl('You cannot connect to yourself');
          return;
        }

        // Check if room already exists for this peer
        const existing = rooms.find(r => r.remotePeerId === remoteId);
        if (existing && existing.conn && existing.conn.open) {
          switchRoom(existing.id);
          return;
        }

        connectBtn.disabled = true;

        let room;
        if (existing) {
          // Reconnect — generate new key pair
          room = existing;
          room.keyPairReady = generateKeyPair().then(kp => { room.myKeyPair = kp; return kp; });
        } else {
          room = createRoom(remoteId);
        }

        room.conn = peer.connect(remoteId, { reliable: true });
        setupConnection(room);
        switchRoom(room.id);
      });

      remoteIdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') connectBtn.click();
      });

      // Username
      usernameInput.addEventListener('input', () => {
        myUsername = usernameInput.value.trim().slice(0, 30);
        localStorage.setItem('peervault_username', myUsername);

        // Broadcast to all connected encrypted rooms
        for (const room of rooms) {
          if (room.conn && room.conn.open && room.sharedKey) {
            encryptMessage(JSON.stringify({ type: 'username', username: myUsername }), room.sharedKey)
              .then(payload => room.conn.send({ type: 'encrypted', payload }));
          }
        }
      });

      // Send message
      sendBtn.addEventListener('click', sendMessage);
      msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        const room = getActiveRoom();
        const text = msgInput.value.trim();
        if (!text || !room || !room.conn || !room.conn.open || !room.sharedKey) return;
        try {
          const payload = await encryptMessage(text, room.sharedKey);
          room.conn.send({ type: 'encrypted', payload });
          addMessage(room, text, ownDisplayName(), true);
          msgInput.value = '';
          msgInput.focus();
        } catch (e) {
          addSystemMessage(room, 'Failed to encrypt message');
        }
      }

      // QR code
      qrBtn.addEventListener('click', () => {
        const id = myIdEl.textContent;
        if (!id || id === '...') return;
        const url = window.location.origin + window.location.pathname + '#peer=' + id;
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const size = 220;
        const cellSize = Math.floor(size / qr.getModuleCount());
        const ctx = qrCanvas.getContext('2d');
        const modules = qr.getModuleCount();
        const totalSize = cellSize * modules;
        qrCanvas.width = totalSize;
        qrCanvas.height = totalSize;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, totalSize, totalSize);
        ctx.fillStyle = '#000000';
        for (let r = 0; r < modules; r++) {
          for (let c = 0; c < modules; c++) {
            if (qr.isDark(r, c)) ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          }
        }
        qrOverlay.classList.add('active');
      });

      qrCloseBtn.addEventListener('click', () => qrOverlay.classList.remove('active'));
      qrOverlay.addEventListener('click', (e) => {
        if (e.target === qrOverlay) qrOverlay.classList.remove('active');
      });

      // Throttled typing signal
      msgInput.addEventListener('input', () => {
        if (!typingTimeout) {
          sendTypingSignal();
          typingTimeout = setTimeout(() => { typingTimeout = null; }, 1000);
        }
      });

      // ── Mobile: resize on virtual keyboard open/close ──
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          document.body.style.height = window.visualViewport.height + 'px';
          messagesEl.scrollTop = messagesEl.scrollHeight;
        });
      }

      // ── Connection resilience: reconnect on network/app resume ──
      function ensurePeerAndRooms() {
        if (!peer || peer.destroyed) {
          initPeer();
          return; // initPeer will fire 'open', rooms reconnect from there
        }
        if (peer.disconnected) {
          peer.reconnect();
        }
        reconnectAllRooms();
      }

      // Network goes online → reconnect everything
      window.addEventListener('online', () => {
        ensurePeerAndRooms();
      });

      // Tab/app becomes visible again → check connections
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          ensurePeerAndRooms();
        }
      });

      // Capacitor app resume
      if (isNative && capPlugins.App) {
        capPlugins.App.addListener('appStateChange', (state) => {
          if (state.isActive) {
            ensurePeerAndRooms();
          }
        });
      }

      // ── Start ──
      initPeer();
      startHeartbeat();
    })();
  </script>
</body>
</html>
