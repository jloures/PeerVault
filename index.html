<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Chat</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #2e2e2e;
      --text: #e4e4e4;
      --text-dim: #777;
      --accent: #6c63ff;
      --accent-hover: #7f78ff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .status-dot.connecting { background: var(--yellow); }
    .status-dot.connected  { background: var(--green); }
    .status-dot.error      { background: var(--red); }

    /* ── Connect bar ── */
    .connect-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .id-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 13px;
      flex: 1;
      min-width: 0;
    }

    .id-display label {
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .id-display .id-value {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: all;
    }

    .connect-group {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 200px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--text-dim);
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.secondary {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    button.secondary:hover {
      background: var(--border);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.own { align-self: flex-end; align-items: flex-end; }
    .msg.their { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 2px;
      padding: 0 4px;
    }

    .msg.own .msg-sender { color: var(--accent); }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg.own .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.their .msg-bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
      padding: 0 4px;
    }

    .msg-system {
      align-self: center;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 20px;
      margin: 8px 0;
    }

    .typing-indicator {
      align-self: flex-start;
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 8px;
      min-height: 24px;
      font-style: italic;
    }

    /* ── Chat input ── */
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input input[type="text"] {
      font-size: 14px;
      padding: 10px 14px;
    }

    .chat-input button {
      padding: 10px 24px;
      font-size: 14px;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 20px;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 360px;
      line-height: 1.5;
    }

    .empty-state .step {
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
    }

    .empty-state .step strong {
      color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .connect-bar { flex-direction: column; }
      .id-display { width: 100%; }
      .connect-group { min-width: 0; width: 100%; }
      .msg { max-width: 88%; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>P2P Chat</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Initializing...</span>
    </div>
  </div>

  <!-- Connect bar -->
  <div class="connect-bar">
    <div class="id-display">
      <label>Your ID</label>
      <span class="id-value" id="myId">...</span>
      <button class="secondary" id="copyBtn" title="Copy your Peer ID" disabled>Copy</button>
    </div>
    <div class="connect-group">
      <input type="text" id="remoteIdInput" placeholder="Enter peer's ID" autocomplete="off" spellcheck="false">
      <button id="connectBtn" disabled>Connect</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <p>No connection yet.</p>
      <div class="step">
        <strong>1.</strong> Copy your ID and share it with a friend<br>
        <strong>2.</strong> Or paste their ID above and click Connect<br>
        <strong>3.</strong> Start chatting peer-to-peer
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typingIndicator"></div>

  <!-- Chat input -->
  <div class="chat-input">
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" disabled>
    <button id="sendBtn" disabled>Send</button>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    (function () {
      'use strict';

      // ── DOM refs ──
      const $ = (id) => document.getElementById(id);
      const myIdEl       = $('myId');
      const copyBtn      = $('copyBtn');
      const remoteIdInput = $('remoteIdInput');
      const connectBtn   = $('connectBtn');
      const messagesEl   = $('messages');
      const emptyState   = $('emptyState');
      const typingEl     = $('typingIndicator');
      const msgInput     = $('msgInput');
      const sendBtn      = $('sendBtn');
      const statusDot    = $('statusDot');
      const statusText   = $('statusText');

      // ── State ──
      let peer = null;
      let conn = null;
      let typingTimeout = null;
      let remoteTypingTimeout = null;

      // ── Helpers ──
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function formatTime(ts) {
        const d = new Date(ts);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function setStatus(state, text) {
        statusDot.className = 'status-dot ' + state;
        statusText.textContent = text;
      }

      function setChatEnabled(enabled) {
        msgInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) msgInput.focus();
      }

      // ── Messages UI ──
      function addMessage(text, sender, isOwn) {
        emptyState.style.display = 'none';
        const wrapper = document.createElement('div');
        wrapper.className = 'msg ' + (isOwn ? 'own' : 'their');

        const senderEl = document.createElement('div');
        senderEl.className = 'msg-sender';
        senderEl.textContent = isOwn ? 'You' : 'Them';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;

        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = formatTime(Date.now());

        wrapper.appendChild(senderEl);
        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addSystemMessage(text) {
        emptyState.style.display = 'none';
        const el = document.createElement('div');
        el.className = 'msg-system';
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // ── Typing indicator ──
      function showRemoteTyping() {
        typingEl.textContent = 'Peer is typing...';
        clearTimeout(remoteTypingTimeout);
        remoteTypingTimeout = setTimeout(() => {
          typingEl.textContent = '';
        }, 2500);
      }

      function sendTypingSignal() {
        if (conn && conn.open) {
          conn.send({ type: 'typing' });
        }
      }

      // ── Connection handling ──
      function setupConnection(connection) {
        conn = connection;
        setStatus('connecting', 'Connecting...');

        conn.on('open', () => {
          setStatus('connected', 'Connected to ' + conn.peer);
          setChatEnabled(true);
          connectBtn.disabled = true;
          remoteIdInput.disabled = true;
          addSystemMessage('Connected to peer ' + conn.peer);
        });

        conn.on('data', (data) => {
          if (data && data.type === 'typing') {
            showRemoteTyping();
            return;
          }
          if (data && data.type === 'chat') {
            addMessage(data.text, 'Them', false);
            // Clear typing indicator when a message arrives
            typingEl.textContent = '';
            clearTimeout(remoteTypingTimeout);
          }
        });

        conn.on('close', () => {
          setStatus('', 'Disconnected');
          setChatEnabled(false);
          connectBtn.disabled = false;
          remoteIdInput.disabled = false;
          addSystemMessage('Peer disconnected');
          conn = null;
        });

        conn.on('error', (err) => {
          setStatus('error', 'Connection error');
          addSystemMessage('Connection error: ' + err.message);
        });
      }

      // ── Init PeerJS ──
      function initPeer() {
        setStatus('connecting', 'Connecting to signaling server...');

        peer = new Peer(undefined, {
          config: {
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun3.l.google.com:19302' },
              { urls: 'stun:stun4.l.google.com:19302' }
            ]
          }
        });

        peer.on('open', (id) => {
          myIdEl.textContent = id;
          copyBtn.disabled = false;
          connectBtn.disabled = false;
          setStatus('', 'Waiting for connection');
        });

        peer.on('connection', (incoming) => {
          if (conn && conn.open) {
            incoming.on('open', () => {
              incoming.send({ type: 'chat', text: '[Peer is already in a session]' });
              setTimeout(() => incoming.close(), 500);
            });
            return;
          }
          setupConnection(incoming);
          addSystemMessage('Incoming connection from ' + incoming.peer);
        });

        peer.on('error', (err) => {
          if (err.type === 'peer-unavailable') {
            setStatus('error', 'Peer not found');
            addSystemMessage('Peer not found — check the ID and try again');
            connectBtn.disabled = false;
          } else if (err.type === 'disconnected' || err.type === 'network') {
            setStatus('error', 'Network error — reconnecting...');
            setTimeout(() => {
              if (peer && peer.destroyed) return;
              peer.reconnect();
            }, 3000);
          } else {
            setStatus('error', 'Error: ' + err.type);
            addSystemMessage('Error: ' + err.message);
          }
        });

        peer.on('disconnected', () => {
          if (!peer.destroyed) {
            setStatus('connecting', 'Reconnecting...');
            setTimeout(() => {
              if (peer && !peer.destroyed) peer.reconnect();
            }, 2000);
          }
        });
      }

      // ── Event listeners ──
      copyBtn.addEventListener('click', () => {
        const id = myIdEl.textContent;
        if (!id || id === '...') return;
        navigator.clipboard.writeText(id).then(() => {
          const original = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          setTimeout(() => { copyBtn.textContent = original; }, 1500);
        });
      });

      connectBtn.addEventListener('click', () => {
        const remoteId = remoteIdInput.value.trim();
        if (!remoteId) return;
        if (remoteId === myIdEl.textContent) {
          addSystemMessage('You cannot connect to yourself');
          return;
        }
        if (conn && conn.open) {
          addSystemMessage('Already connected — disconnect first');
          return;
        }
        connectBtn.disabled = true;
        const outgoing = peer.connect(remoteId, { reliable: true });
        setupConnection(outgoing);
      });

      remoteIdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') connectBtn.click();
      });

      sendBtn.addEventListener('click', sendMessage);
      msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Throttled typing signal
      msgInput.addEventListener('input', () => {
        if (!typingTimeout) {
          sendTypingSignal();
          typingTimeout = setTimeout(() => { typingTimeout = null; }, 1000);
        }
      });

      function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !conn || !conn.open) return;
        conn.send({ type: 'chat', text: text });
        addMessage(text, 'You', true);
        msgInput.value = '';
        msgInput.focus();
      }

      // ── Start ──
      initPeer();
    })();
  </script>
</body>
</html>
